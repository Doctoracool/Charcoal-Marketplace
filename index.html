<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Charcoal Marketplace</title>

<link rel="stylesheet" href="style.css">

<!-- Pi SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  if (window.Pi) {
    Pi.init({ version: "2.0" });
  }
});
</script>

</head>

<body>

<!-- ================= ADMIN MENU ================= -->
<div class="admin-menu">
  <button class="admin-btn" onclick="toggleAdminMenu()">⋮</button>

  <!-- (NO TEXT SHOWN UNTIL CLICK) -->
  <div id="adminDropdown" class="admin-dropdown">
    <a href="admin-login.html">Access Panel</a>
  </div>
</div>

<!-- ================= HEADER ================= -->
<header class="navbar">
  <h1>🔥 Charcoal Marketplace</h1>
</header>

<main>

<!-- HERO -->
<section class="hero">
  <h2>Buy & Sell Charcoal Using Pi Coin</h2>
  <p>Fast • Secure • Transparent Marketplace</p>

  <input 
    id="searchInput"
    type="text"
    placeholder="Search charcoal products..."
    autocomplete="off"
  />
</section>

<!-- STATUS -->
<div id="status" class="status">
  Loading products...
</div>

<!-- PRODUCTS -->
<section id="products" class="grid"></section>

</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html">Home</a>
  <a href="vendor-login.html">Add Product</a>
</nav>

<!-- APP SCRIPT -->
<script src="app.js"></script>

<!-- ADMIN MENU LOGIC -->
<script>
function toggleAdminMenu() {
  const menu = document.getElementById("adminDropdown");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

document.addEventListener("click", function (e) {
  const menu = document.getElementById("adminDropdown");
  const btn = document.querySelector(".admin-btn");

  if (!menu.contains(e.target) && e.target !== btn) {
    menu.style.display = "none";
  }
});
</script>

</body>
</html>
