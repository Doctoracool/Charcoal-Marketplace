<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Vendor Dashboard - Charcoal Marketplace</title>

<link rel="stylesheet" href="vendor-login.css" />

<!-- Pi SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

<div class="login-container">

  <h2>🏪 Vendor Dashboard</h2>

  <p id="msg"></p>

  <!-- PRODUCT FORM -->
  <form id="productForm">

    <input id="name" type="text" placeholder="Product name" required />

    <input id="price_pi" type="number" placeholder="Price in Pi" required />

    <input id="location" type="text" placeholder="Location" required />

    <input id="stock" type="number" placeholder="Stock quantity" required />

    <input id="image" type="file" accept="image/*" required />

    <button id="submitBtn" type="submit">Add Product</button>
  </form>

  <hr />

  <h3>📦 My Products</h3>
  <div id="myProducts"></div>

  <button onclick="logout()" style="margin-top:15px; background:red; color:white;">
    Logout
  </button>

</div>

<script>
const API = window.location.origin + "/api";

/* =========================
   AUTH CHECK
========================= */
const token = localStorage.getItem("vendorToken");

if (!token) {
  window.location.href = "vendor-login.html";
}

/* =========================
   HEADERS
========================= */
function getHeaders() {
  return {
    Authorization: `Bearer ${token}`
  };
}

/* =========================
   LOGOUT
========================= */
function logout() {
  localStorage.removeItem("vendorToken");
  window.location.href = "vendor-login.html";
}

/* =========================
   ADD PRODUCT
========================= */
document.getElementById("productForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  const msg = document.getElementById("msg");

  const form = new FormData();
  form.append("name", document.getElementById("name").value.trim());
  form.append("price_pi", document.getElementById("price_pi").value.trim());
  form.append("location", document.getElementById("location").value.trim());
  form.append("stock", document.getElementById("stock").value.trim());
  form.append("image", document.getElementById("image").files[0]);

  btn.disabled = true;
  btn.innerText = "Uploading...";

  try {
    const res = await fetch(`${API}/products`, {
      method: "POST",
      headers: {
        Authorization: `Bearer ${token}`
      },
      body: form
    });

    const data = await res.json();

    msg.innerText = data.message || "Upload completed";

    if (res.ok) {
      loadMyProducts();
      e.target.reset();
    }

  } catch (err) {
    console.error(err);
    msg.innerText = "Network error";
  }

  btn.disabled = false;
  btn.innerText = "Add Product";
});

/* =========================
   LOAD MY PRODUCTS
========================= */
async function loadMyProducts() {
  const container = document.getElementById("myProducts");

  try {
    const res = await fetch(`${API}/products/my`, {
      headers: getHeaders()
    });

    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      container.innerHTML = "<p>No products yet</p>";
      return;
    }

    container.innerHTML = data.map(p => `
      <div class="card">
        <img src="${window.location.origin}${p.image}" />
        <h3>${p.name}</h3>
        <p>${p.location}</p>
        <b>${p.price_pi} Pi</b>
        <p>Stock: ${p.stock}</p>
        <p>Status: ${p.status}</p>
      </div>
    `).join("");

  } catch (err) {
    console.error(err);
    container.innerHTML = "<p>Error loading products</p>";
  }
}

/* =========================
   INIT
========================= */
loadMyProducts();
</script>

</body>
</html>
